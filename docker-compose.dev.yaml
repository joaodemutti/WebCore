services:
  webcore:
    build:
      context: .
      target: build
    image: webcore-dev
    working_dir: /src/WebCore
    entrypoint: ["dotnet"]
    volumes:
      - ./WebCore:/src/WebCore
      - nuget_cache:/root/.nuget/packages
    command: ["watch", "run", "--project", "WebCore.csproj", "--urls", "http://0.0.0.0:80"]
    ports:
      - "80:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=1

volumes:
  nuget_cache:
